name: Playwright UI Tests
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ui-tests:
    runs-on: ubuntu-latest

    # 1. THE MAGIC DOCKER LINE:
    # This tells GitHub to run everything below inside the official Playwright container
    container:
      image: mcr.microsoft.com/playwright:v1.42.0-jammy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright UI tests
        run: npm test

      # 2. THE ARTIFACT SAVER:
      # This guarantees you get your HTML report even if the tests fail
      - name: Save HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
